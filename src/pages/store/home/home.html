<!DOCTYPE html>
<html lang="es">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Store - Shop</title>

    <link rel="stylesheet" href="/src/style.css">
    <script type="module" src="/src/main.ts"></script>
  </head>

  <body class="layout layout-shop">
    <header id="main-header"></header>

    <aside id="main-sidebar"></aside>

    <main class="store-container">
      <section class="search-bar">
        <form action="" method="post">
          <input type="text" name="search" id="input-search" autocomplete="off" placeholder="Buscar productos...">
          <select name="order" id="select-order">
            <option value="default">Ordenar por</option>
            <option value="price-asc">Precio: Menor a Mayor</option>
            <option value="price-desc">Precio: Mayor a Menor</option>
            <option value="name-asc">Nombre: A-Z</option>
            <option value="name-desc">Nombre: Z-A</option>
          </select>
          <select name="categories" id="select-categories">
            <option value="all">Todas</option>
            <!-- Inyección dinámica de categorías -->
          </select>
        </form>
      </section>
      <section class="product-header">
        <h2>Todos los Productos</h2>
        <p id="product-quantity">
          <!-- Inyección de cantidad de productos -->
        </p>
      </section>
      <section id="product-container">
        <!-- Inyección dinámica de productos -->
      </section>
    </main>

    <footer id="main-footer"></footer>

    <script type="module" src="/src/pages/store/home/home.ts"></script>
  </body>

</html>
