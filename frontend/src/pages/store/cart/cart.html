<!DOCTYPE html>
<html lang="es">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Store - Carrito</title>

    <link rel="stylesheet" href="/src/style.css">
    <script type="module" src="/src/main.ts"></script>
  </head>

  <body class="layout layout--no-sidebar">
    <header id="header"></header>

    <main class="main">
      <section class="main__header main__header--no-sidebar">
        <h2>Mi Carrito</h2>
      </section>

      <section class="main__content main__content--no-sidebar">
        <div class="cart">
          <section id="cart-product-container" class="cart__products">
            <article class="card cart__product">
              <!-- Inyección dinámica de items -->
            </article>
          </section>

          <aside class="card cart__summary">
            <h3 class="cart__summary-title">Resumen del Pedido</h3>

            <div class="cart__summary-detail">
              <div class="cart__summary-row">
                <p>Subtotal</p>
                <p id="cart-subtotal-amount" class="price">0</p>
              </div>
              <div class="cart__summary-row">
                <p>Envío</p>
                <p id="cart-shipping-amount" class="price">0</p>
              </div>

              <hr class="cart__summary-divider">

              <div class="cart__summary-row cart__summary-row--total">
                <p>Total</p>
                <p class="price" id="cart-total-amount">0</p>
              </div>
            </div>

            <div class="cart__summary-actions">
              <button class="btn btn--primary btn--full">Proceder al Pago</button>
              <button class="btn btn--secondary btn--full">Vaciar Carrito</button>
            </div>
          </aside>
        </div>
      </section>
    </main>

    <footer id="footer"></footer>

    <script type="module" src="/src/pages/store/cart/cart.ts"></script>
  </body>

</html>
