<!DOCTYPE html>
<html lang="es">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Store - Carrito</title>

    <link rel="stylesheet" href="/src/style.css">
    <script type="module" src="/src/main.ts"></script>
  </head>

  <body class="layout layout--no-sidebar">
    <header id="header"></header>

    <main class="main">
      <section class="main__header main__header--no-sidebar">
        <h2>Mi Carrito</h2>
      </section>

      <section class="main__content main__content--no-sidebar">
        <div class="cart">
          <section class="cart__products">
            <article class="card cart__product">
              <div class="cart__product-info">
                <img class="cart__product-img" src="../../../assets/hamburguesa.webp" alt="">
                <div class="cart__product-details">
                  <h4 class="cart__product-title">Hamburguesa</h4>
                  <p class="cart__product-description">Hamburguesa bla bla</p>
                  <p class="cart__product-price">$25000 c/u</p>
                </div>
              </div>
              <div class="cart__product-btns">
                <button class="btn btn--product-cart btn--minus">-</button>
                <input type="number" class="product-qty" value="1" min="1">
                <button class="btn btn--product-cart btn--plus">+</button>
                <p class="cart__product-price">$25000</p>
                <button class="btn btn--product-cart btn--trash">🗑</button>
              </div>
            </article>
          </section>

          <aside class="card cart__summary">
            <h3 class="cart__summary-title">Resumen del Pedido</h3>

            <div class="cart__summary-detail">
              <div class="cart__summary-row">
                <p>Subtotal</p>
                <p>$25000</p>
              </div>
              <div class="cart__summary-row">
                <p>Envío</p>
                <p>$500</p>
              </div>

              <hr class="cart__summary-divider">

              <div class="cart__summary-row cart__summary-row--total">
                <p>Total</p>
                <p>$25500</p>
              </div>
            </div>

            <div class="cart__summary-actions">
              <button class="btn btn--primary btn--full">Proceder al Pago</button>
              <button class="btn btn--secondary btn--full">Vaciar Carrito</button>
            </div>
          </aside>
        </div>
      </section>
    </main>

    <footer id="footer"></footer>

    <script type="module" src="/src/pages/store/cart/cart.ts"></script>
  </body>

</html>
