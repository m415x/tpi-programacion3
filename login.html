<!DOCTYPE html>
<html lang="es">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Store - Login</title>

    <link rel="stylesheet" href="./css/styles.css">
  </head>

  <body>
    <main class="container-login">
      <section class="login-card">
        <h1 class="login-card__title">Food Store</h1>
        <h2 class="login-card__subtitle">Iniciar Sesión</h2>

        <form class="login-card__form" action="" method="post">
          <label for="email">Email:</label>
          <input type="email" name="email" id="email" placeholder="tucorreo@email.com" required>

          <label for="pass">Contraseña:</label>
          <input type="password" name="pass" id="pass" minlength="8" placeholder="Mínimo 8 caracteres" required>

          <button class="btn btn__primary" type="submit">Ingresar</button>
        </form>

        <p class="login-card__register">¿No tienes una cuenta? <a href="#">Registrate acá</a></p>
      </section>
    </main>
  </body>

</html>
